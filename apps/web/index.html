    <style>
            * {
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
      }

      /**
        Explicitly load Inter from public/ so it does not block LCP's critical path.
        Uses the local variable TTF you already have in /public/fonts.
      */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900; /* variable font weight range */
        font-display: swap;
        src: url('/fonts/Inter-normal.var.ttf') format('truetype');
      }

      @supports (font-variation-settings: normal) {
        * {
          font-family: 'Inter', sans-serif;
        }
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      /* Only apply overflow-x: hidden on desktop */
      @media (min-width: 768px) {
        html {
          overflow-x: hidden;
        }
      }

      button {
        user-select: none;
      }

      html {
        font-size: 16px;
        font-weight: 485;
        font-variant: none;
        font-smooth: always;
        text-rendering: optimizeLegibility !important;
        -webkit-font-smoothing: antialiased !important;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      @media (prefers-color-scheme: dark) {
        html {
          background: linear-gradient(rgb(19, 19, 19) 0%, rgb(19, 19, 19) 100%);
        }
      }

      @media (prefers-color-scheme: light) {
        html {
          background: radial-gradient(100% 100% at 50% 0%, rgba(255, 184, 226, 0) 0%, rgba(255, 255, 255, 0) 100%), rgb(255, 255, 255);
        }
      }
    </style>
